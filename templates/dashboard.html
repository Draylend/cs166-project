{% extends "base.html" %}

{% block content %}
    <h1 style="display: flex; justify-content: center; margin: 0px;">Dashboard</h1>
    <h2 style="display: flex; justify-content: center; margin: 0px;">Welcome {{ user.login }}!</h2>
    <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh;">
        <!-- Search Bar (searches by item name) -->
        <form action="/search" method="GET">
            <input type="text" name="query" placeholder="Search auctions">
            <button type="submit">Search</button>
        </form>
    </div>
{% endblock %}
