<!-- Login Page -->
<!-- Takes in login and password, pressing "Submit" sends form -->

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>{{ title }}</title>
    </head>
    <body>
        <!-- Go Back Button -->
        <a href="/">
            <button style="position: absolute; padding: 10px 20px; font-size: 16px; left: 0px;">
                Go Back
            </button>
        </a>

        <h1 style="display: flex; justify-content: center; margin: 0px;">tBay Login</h1>
        <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh;">
            <!-- Display error message for invalid logins -->
            <p style="color: red; height: 25px; margin: 0;">
                {% if error %}{{ error }}{% endif %}
            </p>

            <!-- Submission Form -->
            <form action="/login" method="POST">
                <label>Login:</label>
                <input type="text" name="login" required>

                <br><br>

                <label>Password:</label>
                <input type="password" name="password" required>

                <br><br>

                <button type="submit">Login</button>
            </form>
        </div>
    </body>
</html>
