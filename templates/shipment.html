<!-- Shipment Page -->
<!-- Display information about a users shipments -->
<!-- TODO: Add fields, coloring based on status -->

{% extends "base.html" %}

{% block content %}
    Shipment Page
    {% if results %}
        <div class="grid">
        <!-- Display all results in a grid -->
        {% for result in results %}
            <div class="card">
                {{ result.shipment_status }} — {{ result.item_name }}
            </div>
        {% endfor %}
        </div>
    {% else %}
        <p>No shipments found.</p>
    {% endif %}
{% endblock %}
