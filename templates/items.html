{% extends "base.html" %}

{% block content %}
    <!-- Display all items -->
    {% if results %}
        <div class="grid">
        <!-- Display all results in a grid -->
        {% for item in results %}
            <div class="card">
                {{ item.item_name }} — {{ item.description }}
            </div>
        {% endfor %}
        </div>
    {% else %}
        <p>No items found.</p>
    {% endif %}
{% endblock %}
